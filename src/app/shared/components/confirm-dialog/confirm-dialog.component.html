<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4 py-8">
  <section class="app-card w-full max-w-xl rounded-[1.5rem] p-6">
    <h2 class="font-display text-3xl" [style.color]="'var(--fc-text)'">{{ title }}</h2>
    <p class="mt-3 text-sm leading-7" [style.color]="'var(--fc-muted)'">{{ message }}</p>

    <ul *ngIf="items.length" class="mt-4 space-y-2 text-sm" [style.color]="'var(--fc-muted)'">
      <li *ngFor="let item of items">- {{ item }}</li>
    </ul>

    <div class="mt-6 flex flex-wrap justify-end gap-3">
      <button type="button" class="app-button app-button-secondary text-sm" (click)="cancel.emit()">
        {{ cancelLabel }}
      </button>
      <button type="button" class="app-button app-button-primary text-sm" (click)="confirm.emit()">
        {{ confirmLabel }}
      </button>
    </div>
  </section>
</div>
